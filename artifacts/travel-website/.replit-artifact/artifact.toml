kind = "web"
previewPath = "/"
title = "Next Visa Travel"
version = "1.0.0"
id = "artifacts/travel-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18953

[services.development]
run = "pnpm --filter @workspace/travel-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-website", "run", "build" ]
publicDir = "artifacts/travel-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18953"
BASE_PATH = "/"
