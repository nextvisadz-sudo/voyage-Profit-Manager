openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: hotels
    description: Hotel search operations
  - name: commission
    description: Commission configuration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /hotels/search:
    get:
      operationId: searchHotels
      tags: [hotels]
      summary: Search hotels
      description: Search hotels via H24Voyages API and apply commission markup to prices
      parameters:
        - name: destination
          in: query
          required: false
          schema:
            type: string
          description: Destination name or city
        - name: checkin
          in: query
          required: false
          schema:
            type: string
          description: Check-in date (YYYY-MM-DD)
        - name: checkout
          in: query
          required: false
          schema:
            type: string
          description: Check-out date (YYYY-MM-DD)
        - name: adults
          in: query
          required: false
          schema:
            type: integer
          description: Number of adults
        - name: rooms
          in: query
          required: false
          schema:
            type: integer
          description: Number of rooms
        - name: page
          in: query
          required: false
          schema:
            type: integer
          description: Page number
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Results per page
      responses:
        "200":
          description: Hotel search results with commission applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelSearchResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /commission:
    get:
      operationId: getCommission
      tags: [commission]
      summary: Get commission configuration
      description: Get the current profit commission percentage
      responses:
        "200":
          description: Current commission setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionConfig"
    put:
      operationId: updateCommission
      tags: [commission]
      summary: Update commission configuration
      description: Update the profit commission percentage applied to hotel prices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionUpdate"
      responses:
        "200":
          description: Updated commission setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionConfig"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /commission/stats:
    get:
      operationId: getCommissionStats
      tags: [commission]
      summary: Get commission statistics
      description: Get stats about how many searches have had commission applied
      responses:
        "200":
          description: Commission statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    HotelRoom:
      type: object
      properties:
        boardName:
          type: string
          description: Board type name (e.g. "Logement simple", "Petit Déjeuner", "Demi pension")
        originalAmount:
          type: number
          description: Raw DZD amount from provider
        amount:
          type: number
          description: DZD amount with commission applied
      required:
        - boardName
        - originalAmount
        - amount

    Hotel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        destination:
          type: string
        stars:
          type: number
        image:
          type: string
        description:
          type: string
        originalPrice:
          type: number
          description: Raw DZD price from provider (no conversion)
        price:
          type: number
          description: DZD price with commission markup applied
        currency:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        amenities:
          type: array
          items:
            type: string
        roomType:
          type: string
        mealPlan:
          type: string
        nights:
          type: integer
        rooms:
          type: array
          description: Available room options with board types and commission-applied prices
          items:
            $ref: "#/components/schemas/HotelRoom"
      required:
        - id
        - name
        - destination
        - price
        - currency

    HotelSearchResponse:
      type: object
      properties:
        hotels:
          type: array
          items:
            $ref: "#/components/schemas/Hotel"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        commissionPercent:
          type: number
        destination:
          type: string
        checkin:
          type: string
        checkout:
          type: string
      required:
        - hotels
        - total
        - commissionPercent

    CommissionConfig:
      type: object
      properties:
        percent:
          type: number
          description: Commission percentage (e.g. 10 for 10%)
        updatedAt:
          type: string
          format: date-time
      required:
        - percent
        - updatedAt

    CommissionUpdate:
      type: object
      properties:
        percent:
          type: number
          minimum: 0
          maximum: 100
          description: Commission percentage (0-100)
      required:
        - percent

    CommissionStats:
      type: object
      properties:
        totalSearches:
          type: integer
        totalHotelsServed:
          type: integer
        currentPercent:
          type: number
        lastSearchAt:
          type: string
          format: date-time
          nullable: true
      required:
        - totalSearches
        - totalHotelsServed
        - currentPercent

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
